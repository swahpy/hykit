name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          # Only diff files that actually exist — go.sum won't exist until we take on a dependency.
          files="go.mod"
          [ -f go.sum ] && files="$files go.sum"
          git diff --exit-code -- $files || (echo "$files drifted; run 'go mod tidy' locally" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race -count=1 ./...
